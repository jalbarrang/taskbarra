included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm

disabled_rules:
  # Tests use a custom executable runner because this CLT/Xcode setup does not expose XCTest/Testing to SwiftPM.
  - private_unit_test

opt_in_rules:
  - empty_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - sorted_imports

analyzer_rules:
  - unused_import

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id

trailing_comma:
  mandatory_comma: true
