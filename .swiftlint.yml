included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm

opt_in_rules:
  - empty_count
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - sorted_imports
  - unused_import

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
